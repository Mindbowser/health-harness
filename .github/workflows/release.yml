name: release

# Every push to main releases (see CLAUDE.md). This auto-cuts the tag so a merged PR can't sit on main
# untagged (the gap that left v0.2.22–0.2.24 unreleased). Reads the CURRENT version from the manifests,
# verifies the three agree, runs the gate, and tags `health-harness--v<version>` — idempotent: a merge with
# no version bump (tag already exists) is a clean no-op. Manual `npm run release` remains a fallback.

on:
  push:
    branches: [main]

permissions:
  contents: write   # create + push the tag

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history + existing tags

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version + verify the three manifests agree
        id: ver
        run: |
          node -e "const {versions,agree}=require('./bin/version-check.js'); const v=versions(); if(!agree(v)){console.error('✗ version mismatch:',JSON.stringify(v));process.exit(1)} process.stdout.write(v.plugin)" > .ver
          V="$(cat .ver)"; rm -f .ver
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=health-harness--v$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version $V"

      - name: Does the tag already exist?
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "→ ${{ steps.ver.outputs.tag }} already exists — no release (no-op)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate (npm test)
        if: steps.check.outputs.exists == 'false'
        run: npm test   # zero deps → no install step

      - name: Tag the release
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "release: v${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          echo "✓ released ${{ steps.ver.outputs.tag }}"
